# T-308 — main 푸시 → 테스트 통과 시 EC2 자동 배포(🙋 사용자 선택 2026-07-06).
# 서버 준비물: 레포 clone(/opt/market-village), environment/ 수동 복사(gitignore),
# .env.production, docker compose v2. 시크릿: EC2_HOST / EC2_USER / EC2_SSH_KEY.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # 수동 재배포용

concurrency:
  group: deploy-production
  cancel-in-progress: false   # 배포 중 새 푸시는 대기(중단하면 반쪽 배포)

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install -r requirements.txt
      - run: python -m pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npx tsc --noEmit

  deploy:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy over SSH (git pull + compose up)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 20m
          script: |
            cd /opt/market-village
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
            # Caddyfile은 마운트 볼륨이라 up -d가 caddy를 재생성하지 않는다 → 명시 재시작으로
            # 새 Caddyfile(도메인·TLS 등) 반영. Caddy가 재시작 시 /etc/caddy/Caddyfile 재로드.
            docker compose -f docker-compose.prod.yml --env-file .env.production restart caddy
            docker image prune -f
