# Production stack — single VPS (T-SVC2/T-SVC3).
#
# 준비물: 이 레포를 VPS에 올리고(git clone/rsync), `environment/`는 gitignore라
# 별도로 복사해야 함(backend/Dockerfile 참고). `.env.production`을
# `.env.production.example` 참고해 채운 뒤:
#
#   docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build
#
# 실제 VPS 프로비저닝·도메인 연결·최초 실행은 하드게이트(사람 승인) — 이 파일은
# 준비만 해 둔 것이고 실행/배포는 별도 승인 후 진행한다.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongo_prod_data:/data/db
    # 외부 미노출 — backend만 내부 네트워크로 접근(§T-SVC3 하드게이트 조건).

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      MONGO_URI: mongodb://${MONGO_ROOT_USER}:${MONGO_ROOT_PASSWORD}@mongo:27017/?authSource=admin
      MONGO_DB: market_village
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # T-SVC8 — LLM 과금 방어: 프로덕션 기본 차단(0), 한도는 예산 결정 후 조정.
      MV_ALLOW_LLM: ${MV_ALLOW_LLM:-0}
      MV_LLM_DAILY_MAX: ${MV_LLM_DAILY_MAX:-500}

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # T-311 — rewrites가 빌드에 구워지므로 build arg로 주입(runtime env 아님).
        BACKEND_ORIGIN: http://backend:8100
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_ORIGIN: http://backend:8100

  caddy:
    image: caddy:2
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  mongo_prod_data:
  caddy_data:
  caddy_config:
