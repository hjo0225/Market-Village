<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Market Village — 배경 지도</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<!-- 네임플레이트 폰트(사용자 요청) — 오프라인이면 Malgun Gothic 폴백 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#5a7a4a; overflow:hidden; }
  #game{ position:fixed; inset:0; }
</style>
</head>
<body>
<div id="game"></div>

<script>
/**
 * T-FE2 — 순수 배경 지도(§12.0 엔진→표현). 사이드바 없음, 상태 없음.
 * Next.js(frontend/)가 UI 전체를 소유하고, 이 페이지는 오직 the_ville 위에서
 * GameRun 클론이 걷는 걸 그리는 <iframe> 배경으로만 쓰인다.
 *
 * 사용법: /map?game_id=<Next.js가 만든 게임> — 새 게임을 여기서 만들지 않는다
 * (이미 있는 게임에 "연결"만 한다). 하루가 지나면 부모 창이
 * postMessage({type:"walk"})를 보내 오늘 걸음을 재생시킨다.
 */
const TILE = 32, MAPW = 140, MAPH = 100;
// T-233 — 캐릭터 확대(사용자 요청: 2배 → 그 0.75배 = 1.5). 이동은 픽셀 좌표 기반이라
// 스케일과 무관(오류 없음), 타일보다 커져 벽·가구와 살짝 겹칠 수 있음 — 이 값만 조절.
const SPRITE_SCALE = 1.5;
const CLONE_ORIG = "gamerun_clone";
let game = null, scene = null, sprites = {};
// T-229 — 걷기 세대 토큰: 새 하루 걷기가 시작되면 이전 날 루프는 즉시 종료(중첩 방지).
let walkGen = 0;
// T-232 — 실제 걷기 재생 중인 루프 수(>0이면 잔잔한 배회 일시 정지).
let walkActive = 0;

// 개발환경 프록시(Next.js rewrites)가 Windows에서 간헐적으로 503/네트워크 오류를
// 낼 수 있어(알려진 환경 플레이크, RETRO 참고) 1회 자동 재시도한다.
async function api(path){
  for (let attempt = 0; attempt < 2; attempt++){
    try {
      const r = await fetch(path);
      if (r.ok) return r.json();
    } catch (e) { /* 재시도 */ }
    await new Promise((res) => setTimeout(res, 400));
  }
  return { status: "error", error: "network" };
}

// walkers: [{orig, key(스프라이트시트), initial(라벨), x, y, cam(카메라 추적 여부)}]
// T-221 — 클론 1개 전용이던 부트를 클론+NPC 8종(§9.5.3)으로 일반화.
function bootPhaser(walkers){
  if (game){ game.destroy(true); sprites = {}; }
  const config = {
    type: Phaser.AUTO, parent: "game", backgroundColor: "#5a7a4a",
    pixelArt: true,
    scale: { mode: Phaser.Scale.RESIZE, width: "100%", height: "100%" },
    scene: { preload, create, update },
  };
  const sheets = [...new Set(walkers.map((w) => w.key))];
  function preload(){
    this.load.image("bg", "/assets/the_ville/visuals/the_ville_full.png");
    this.load.image("fg", "/assets/the_ville/visuals/the_ville_fg.png");
    sheets.forEach((key) => this.load.spritesheet(key, "/assets/characters/" + key + ".png",
      { frameWidth: 32, frameHeight: 32 }));
  }
  function create(){
    scene = this;
    this.add.image(0, 0, "bg").setOrigin(0).setDisplaySize(MAPW * TILE, MAPH * TILE);
    this.add.image(0, 0, "fg").setOrigin(0).setDisplaySize(MAPW * TILE, MAPH * TILE).setDepth(15);
    const dirs = { down: [0, 1, 2], left: [3, 4, 5], right: [6, 7, 8], up: [9, 10, 11] };
    sheets.forEach((key) => Object.entries(dirs).forEach(([d, fr]) => {
      this.anims.create({ key: key + "-" + d,
        frames: this.anims.generateFrameNumbers(key, { frames: fr }), frameRate: 6, repeat: -1 });
    }));
    // T-233(사용자 요청) — 이름표는 기본 텍스트 대신 직접 그린 네임플레이트:
    // 고해상도 텍스트(setResolution)로 카메라 줌에서도 선명하고, 둥근 반투명 배경.
    const makeNameplate = (scn, x, y, text, isClone) => {
      const t = scn.add.text(0, 0, text, {
        fontSize: "20px",
        fontFamily: "Pretendard, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif",
        fontStyle: "bold", color: isClone ? "#baff7a" : "#ffffff",
      }).setOrigin(0.5).setResolution(3);
      const bw = t.width + 12, bh = t.height + 6;
      const g = scn.add.graphics();
      g.fillStyle(0x000000, 0.62);
      g.fillRoundedRect(-bw / 2, -bh / 2, bw, bh, 5);
      g.lineStyle(1, isClone ? 0xbaff7a : 0xffffff, 0.35);
      g.strokeRoundedRect(-bw / 2, -bh / 2, bw, bh, 5);
      return scn.add.container(x, y, [g, t]).setDepth(20);
    };
    walkers.forEach((w) => {
      const s = this.add.sprite(w.x * TILE + 16, w.y * TILE + 16, w.key, 1)
        .setDepth(10).setScale(SPRITE_SCALE);
      const label = makeNameplate(this, w.x * TILE + 16, w.y * TILE - 6, w.initial,
        w.orig === CLONE_ORIG);
      sprites[w.orig] = { s, label, key: w.key, tx: w.x * TILE + 16, ty: w.y * TILE + 16 };
    });
    const cam = walkers.find((w) => w.cam) || walkers[0];
    this.cameras.main.setBounds(0, 0, MAPW * TILE, MAPH * TILE);
    this.cameras.main.centerOn(cam.x * TILE, cam.y * TILE);
    this.cameras.main.setZoom(1.35);
  }
  // T-238 — 지수 감속 보간(매 타일 도착 직전 멈칫 → 가다-서다)을 등속 이동으로.
  // o.speed(px/frame)는 스텝 간격에 맞춰 playSteps가 정해준다(다음 스텝에 맞춰 도착).
  function update(){
    Object.values(sprites).forEach((o) => {
      const dx = o.tx - o.s.x, dy = o.ty - o.s.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0.1){
        const v = o.speed || 2.0;
        const k = Math.min(1, v / dist);
        o.s.x += dx * k;
        o.s.y += dy * k;
      }
      o.label.x = o.s.x; o.label.y = o.s.y - 6 - 16 * SPRITE_SCALE;
    });
  }
  game = new Phaser.Game(config);
}

function moveSpriteToPx(o, nx, ny, pan, speed){
  const dx = nx - o.tx, dy = ny - o.ty;
  let dir = null;
  if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? "right" : (dx < 0 ? "left" : null);
  else dir = dy > 0 ? "down" : (dy < 0 ? "up" : null);
  if (dir && scene) o.s.play(o.key + "-" + dir, true);
  else if (scene) o.s.stop();
  o.tx = nx; o.ty = ny;
  o.speed = speed || 1.2;   // T-238 — 등속 이동 속도(px/frame). 배회 기본은 느긋하게.
  if (pan && scene) scene.cameras.main.pan(nx, ny, 300, "Linear", true);
}

function moveSprite(orig, x, y, pan, speed){
  const o = sprites[orig]; if (!o) return;
  o.anchor = null;   // 실제 걷기 — 배회 앵커는 도착 지점에서 다시 잡는다(T-232)
  moveSpriteToPx(o, x * TILE + 16, y * TILE + 16, pan, speed);
}

// T-232 — 대기 중 잔잔한 배회(순수 연출): 몇 초에 한 번 임의 스프라이트가 앵커
// (마지막 실제 위치) 주변 ≤1타일을 다녀온다. 실제 걷기 중엔 쉬고, 게임 로직 무영향.
const IDLE_TICK_MS = 2200;
setInterval(() => {
  if (!scene || walkActive > 0) return;
  const keys = Object.keys(sprites);
  if (!keys.length) return;
  const o = sprites[keys[Math.floor(Math.random() * keys.length)]];
  if (!o.anchor) o.anchor = { x: o.tx, y: o.ty };
  const roam = Math.random() < 0.55;
  const nx = roam ? o.anchor.x + Math.round((Math.random() * 2 - 1) * TILE) : o.anchor.x;
  const ny = roam ? o.anchor.y + Math.round((Math.random() * 2 - 1) * TILE * 0.6) : o.anchor.y;
  moveSpriteToPx(o, nx, ny, false);
  setTimeout(() => { if (walkActive === 0) o.s.stop(); }, 700);  // 제자리 걸음 방지
}, IDLE_TICK_MS);

// §13.3 "빠르게 지나갈 날은 빨리감기" — 수백 타일을 한 칸씩 재생하지 않고 균등 샘플링.
function sampleSteps(allSteps, max){
  const n = allSteps.length;
  return n <= max ? allSteps
    : Array.from({ length: max }, (_, i) => allSteps[Math.floor(i * (n - 1) / (max - 1))]);
}

async function playSteps(orig, allSteps, pan, stepMs, max, gen){
  walkActive += 1;
  try {
    for (const [x, y] of sampleSteps(allSteps, max)){
      if (gen !== walkGen) return;   // T-229 — 새 날 걷기가 시작됨: 이전 루프 종료
      moveSprite(orig, x, y, pan);
      await new Promise((r) => setTimeout(r, stepMs));
    }
    const o = sprites[orig];
    if (o && scene) o.s.stop();
  } finally {
    walkActive -= 1;
  }
}

// T-233 — 사용자 피드백("순간이동 말고 집에서부터 한칸씩"): 샘플링 대신 전체 타일을
// 연속 재생한다. 스텝 간격은 경로 길이에 맞춰 목표 시간 안에 들어오게 조절(130~320ms),
// 폭주 방지로 600타일 하드캡만 유지. 짧은 경로(NPC)는 자연히 먼저 도착해 배회로 전환.
const WALK_TARGET_MS = 48000, BAND_TARGET_MS = 16000;
const STEP_MS_MIN = 130, STEP_MS_MAX = 320, HARD_CAP = 600;

function stepMsFor(n, targetMs){
  if (n <= 0) return STEP_MS_MAX;
  return Math.max(STEP_MS_MIN, Math.min(STEP_MS_MAX, Math.floor((targetMs || WALK_TARGET_MS) / n)));
}

async function walkToday(gameId){
  const gen = ++walkGen;   // T-229 — 이 날 걷기의 세대(이전 날 잔여 루프 즉시 무효화)
  const w = await api("/control/game/day/walk?game_id=" + encodeURIComponent(gameId));
  // NPC들은 카메라 추적 없이 동시 재생(T-221 상시 이동 연출) — 완료를 기다리지 않고
  // 클론 걸음(페이싱 계약)이 끝나면 walked를 보낸다.
  Object.entries(w.npcs || {}).forEach(([nid, steps]) => {
    playSteps(nid, steps || [], false, stepMsFor((steps || []).length), HARD_CAP, gen);
  });
  const cloneSteps = w.steps || [];
  await playSteps(CLONE_ORIG, cloneSteps, true, stepMsFor(cloneSteps.length), HARD_CAP, gen);
  window.parent.postMessage({ type: "walked" }, "*");
}

// T-237 §12.1b — 시간대 동기 재생: 부모가 {type:"walk", band:"오전"…}를 단계마다
// 보내면 그 시간대 일과 구간만 걷고 {type:"walked", band}로 답한다. 하루치 경로는
// 첫 구간(오전)에서 한 번만 받아 캐시(서버가 day 캐시라 재요청하면 빈값이 온다).
let walkData = null;

async function walkBand(gameId, band){
  const gen = ++walkGen;
  if (band === "오전" || walkData === null){
    walkData = await api("/control/game/day/walk?game_id=" + encodeURIComponent(gameId));
  }
  const segs = (walkData.segments || {});
  const npcSegs = (walkData.npc_segments || {});
  Object.entries(npcSegs).forEach(([nid, bands]) => {
    const seg = (bands || {})[band] || [];
    playSteps(nid, seg, false, stepMsFor(seg.length, BAND_TARGET_MS), HARD_CAP, gen);
  });
  const cloneSeg = segs[band] || [];
  await playSteps(CLONE_ORIG, cloneSeg, true, stepMsFor(cloneSeg.length, BAND_TARGET_MS), HARD_CAP, gen);
  window.parent.postMessage({ type: "walked", band }, "*");
  if (band === "저녁") walkData = null;   // 다음 날은 새로 받는다
}

async function boot(gameId){
  // Phaser 텍스트는 캔버스 렌더라 폰트가 로드된 뒤 만들어야 한다(실패해도 폴백 폰트로 진행).
  try { await document.fonts.load("bold 20px Pretendard"); } catch (e) { /* 폴백 */ }
  const home = await api("/control/game/day/home?game_id=" + encodeURIComponent(gameId));
  if (home.status !== "ok") return;
  const walkers = [
    { orig: CLONE_ORIG, key: home.persona.underscore, initial: home.persona.initial,
      x: home.pos[0], y: home.pos[1], cam: true },
    ...(home.npcs || []).map((n) => (
      { orig: n.id, key: n.sprite, initial: n.name, x: n.pos[0], y: n.pos[1], cam: false })),
  ];
  bootPhaser(walkers);
}

const params = new URLSearchParams(location.search);
const GAME_ID = params.get("game_id");
if (GAME_ID) boot(GAME_ID);

window.addEventListener("message", (e) => {
  if (!GAME_ID || !e.data) return;
  if (e.data.type === "walk"){
    // T-233 — 수신 즉시 ack: 부모(MapBackground)가 "지도 살아있음"을 알고
    // 걷기 완료(walked)까지 제대로 기다릴 수 있게 한다(기존 4초 포기 문제).
    window.parent.postMessage({ type: "walk-ack", band: e.data.band ?? null }, "*");
    if (e.data.band) walkBand(GAME_ID, e.data.band);   // T-237 시간대 동기 재생
    else walkToday(GAME_ID);                            // 하위호환(밴드 없는 통재생)
  }
});
</script>
</body>
</html>
