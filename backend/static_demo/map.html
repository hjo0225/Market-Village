<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Market Village — 배경 지도</title>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
<!-- 네임플레이트 폰트(사용자 요청) — 오프라인이면 Malgun Gothic 폴백 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; background:#5a7a4a; overflow:hidden; }
  #game{ position:fixed; inset:0; }
</style>
</head>
<body>
<div id="game"></div>

<script>
/**
 * T-FE2 — 순수 배경 지도(§12.0 엔진→표현). 사이드바 없음, 상태 없음.
 * Next.js(frontend/)가 UI 전체를 소유하고, 이 페이지는 오직 the_ville 위에서
 * GameRun 클론이 걷는 걸 그리는 <iframe> 배경으로만 쓰인다.
 *
 * 사용법: /map?game_id=<Next.js가 만든 게임> — 새 게임을 여기서 만들지 않는다
 * (이미 있는 게임에 "연결"만 한다). 하루가 지나면 부모 창이
 * postMessage({type:"walk"})를 보내 오늘 걸음을 재생시킨다.
 */
const TILE = 32, MAPW = 140, MAPH = 100;
// T-233 — 캐릭터 확대(사용자 요청: 2배 → 그 0.75배 = 1.5). 이동은 픽셀 좌표 기반이라
// 스케일과 무관(오류 없음), 타일보다 커져 벽·가구와 살짝 겹칠 수 있음 — 이 값만 조절.
const SPRITE_SCALE = 1.5;
const CLONE_ORIG = "gamerun_clone";
let game = null, scene = null, sprites = {};
// T-229 — 걷기 세대 토큰: 새 하루 걷기가 시작되면 이전 날 루프는 즉시 종료(중첩 방지).
let walkGen = 0;
// T-232 — 실제 걷기 재생 중인 루프 수(>0이면 잔잔한 배회 일시 정지).
let walkActive = 0;
// T-255 — 게시판 열림 동안 마을 정지(배회도 쉼).
let boardGather = false;
// 리뷰 수정 — 말풍선 세대 토큰: 상태 전환(밴드 시작·게시판 열림/닫힘·매매 FX)마다
// 올려서, 이전 상태가 걸어둔 정리 타이머가 새 상태의 말풍선을 덮지 못하게 한다.
let bubbleGen = 0;

// 개발환경 프록시(Next.js rewrites)가 Windows에서 간헐적으로 503/네트워크 오류를
// 낼 수 있어(알려진 환경 플레이크, RETRO 참고) 1회 자동 재시도한다.
async function api(path){
  for (let attempt = 0; attempt < 2; attempt++){
    try {
      const r = await fetch(path);
      if (r.ok) return r.json();
    } catch (e) { /* 재시도 */ }
    await new Promise((res) => setTimeout(res, 400));
  }
  return { status: "error", error: "network" };
}

// walkers: [{orig, key(스프라이트시트), initial(라벨), x, y, cam(카메라 추적 여부)}]
// T-221 — 클론 1개 전용이던 부트를 클론+NPC 8종(§9.5.3)으로 일반화.
function bootPhaser(walkers){
  if (game){ game.destroy(true); sprites = {}; }
  const config = {
    type: Phaser.AUTO, parent: "game", backgroundColor: "#5a7a4a",
    pixelArt: true,
    scale: { mode: Phaser.Scale.RESIZE, width: "100%", height: "100%" },
    scene: { preload, create, update },
  };
  const sheets = [...new Set(walkers.map((w) => w.key))];
  function preload(){
    this.load.image("bg", "/assets/the_ville/visuals/the_ville_full.png");
    this.load.image("fg", "/assets/the_ville/visuals/the_ville_fg.png");
    // T-247 — 말풍선은 원본(generative agents) 에셋 사용(사용자 요청).
    this.load.image("bubble", "/assets/speech_bubble/v3.png");
    sheets.forEach((key) => this.load.spritesheet(key, "/assets/characters/" + key + ".png",
      { frameWidth: 32, frameHeight: 32 }));
  }
  function create(){
    scene = this;
    this.add.image(0, 0, "bg").setOrigin(0).setDisplaySize(MAPW * TILE, MAPH * TILE);
    this.add.image(0, 0, "fg").setOrigin(0).setDisplaySize(MAPW * TILE, MAPH * TILE).setDepth(15);
    const dirs = { down: [0, 1, 2], left: [3, 4, 5], right: [6, 7, 8], up: [9, 10, 11] };
    sheets.forEach((key) => Object.entries(dirs).forEach(([d, fr]) => {
      this.anims.create({ key: key + "-" + d,
        frames: this.anims.generateFrameNumbers(key, { frames: fr }), frameRate: 6, repeat: -1 });
    }));
    // T-240 — 장소 이름 라벨(카페/일터/광장/집): 캐릭터 네임플레이트보다 연한
    // 고정 플레이트. 어디로 걸어가는지 읽을 수 있게 한다.
    const PLACE_ICON = { "카페": "☕", "일터": "🛠", "광장": "🌳", "집": "🏠",
                         "펍": "🍺", "마켓": "🧺", "도서관": "📚" };
    (window.__PLACES || []).forEach((pl) => {
      const txt = this.add.text(0, 0, (PLACE_ICON[pl.name] || "📍") + " " + pl.name, {
        fontSize: "16px",
        fontFamily: "Pretendard, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif",
        fontStyle: "bold", color: "#fffbe8",
      }).setOrigin(0.5).setResolution(3);
      const bw = txt.width + 12, bh = txt.height + 6;
      const g = this.add.graphics();
      g.fillStyle(0x2f2a1d, 0.45);
      g.fillRoundedRect(-bw / 2, -bh / 2, bw, bh, 5);
      // 캐릭터 네임플레이트(중심점에 몰림)와 겹치지 않게 한 타일 위에 띄운다.
      this.add.container(pl.pos[0] * TILE + 16, pl.pos[1] * TILE - 44, [g, txt]).setDepth(18);
    });

    // T-233(사용자 요청) — 이름표는 기본 텍스트 대신 직접 그린 네임플레이트:
    // 고해상도 텍스트(setResolution)로 카메라 줌에서도 선명하고, 둥근 반투명 배경.
    const makeNameplate = (scn, x, y, text, isClone) => {
      const t = scn.add.text(0, 0, text, {
        fontSize: "20px",
        fontFamily: "Pretendard, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif",
        fontStyle: "bold", color: isClone ? "#baff7a" : "#ffffff",
      }).setOrigin(0.5).setResolution(3);
      const bw = t.width + 12, bh = t.height + 6;
      const g = scn.add.graphics();
      g.fillStyle(0x000000, 0.62);
      g.fillRoundedRect(-bw / 2, -bh / 2, bw, bh, 5);
      g.lineStyle(1, isClone ? 0xbaff7a : 0xffffff, 0.35);
      g.strokeRoundedRect(-bw / 2, -bh / 2, bw, bh, 5);
      return scn.add.container(x, y, [g, t]).setDepth(20);
    };
    walkers.forEach((w) => {
      const s = this.add.sprite(w.x * TILE + 16, w.y * TILE + 16, w.key, 1)
        .setDepth(10).setScale(SPRITE_SCALE);
      const label = makeNameplate(this, w.x * TILE + 16, w.y * TILE - 6, w.initial,
        w.orig === CLONE_ORIG);
      sprites[w.orig] = { s, label, key: w.key, tx: w.x * TILE + 16, ty: w.y * TILE + 16 };
    });
    const cam = walkers.find((w) => w.cam) || walkers[0];
    this.cameras.main.setBounds(0, 0, MAPW * TILE, MAPH * TILE);
    this.cameras.main.setZoom(1.35);
    // T-247 — 카메라는 목표 좌표가 아니라 실제 스프라이트를 따라간다(둘이 따로 놀지
    // 않게, 사용자 리포트 ①). lerp 0.08로 부드럽게 밀착.
    const camObj = sprites[cam.orig];
    if (camObj) this.cameras.main.startFollow(camObj.s, true, 0.08, 0.08);
  }
  // T-238 — 지수 감속 보간(매 타일 도착 직전 멈칫 → 가다-서다)을 등속 이동으로.
  // o.speed(px/frame)는 스텝 간격에 맞춰 playSteps가 정해준다(다음 스텝에 맞춰 도착).
  function update(){
    Object.values(sprites).forEach((o) => {
      const dx = o.tx - o.s.x, dy = o.ty - o.s.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0.1){
        const v = o.speed || 2.0;
        const k = Math.min(1, v / dist);
        o.s.x += dx * k;
        o.s.y += dy * k;
      }
      o.label.x = o.s.x; o.label.y = o.s.y - 6 - 16 * SPRITE_SCALE;
      if (o.bubble){ o.bubble.x = o.s.x; o.bubble.y = o.label.y - 26; }   // T-242
    });
  }
  game = new Phaser.Game(config);
}

function moveSpriteToPx(o, nx, ny, pan, speed){
  const dx = nx - o.tx, dy = ny - o.ty;
  let dir = null;
  if (Math.abs(dx) > Math.abs(dy)) dir = dx > 0 ? "right" : (dx < 0 ? "left" : null);
  else dir = dy > 0 ? "down" : (dy < 0 ? "up" : null);
  if (dir && scene) o.s.play(o.key + "-" + dir, true);
  else if (scene) o.s.stop();
  o.tx = nx; o.ty = ny;
  o.speed = speed || 1.2;   // T-238 — 등속 이동 속도(px/frame). 배회 기본은 느긋하게.
  // 카메라는 startFollow가 담당(T-247) — pan 사용 안 함.
}

function moveSprite(orig, x, y, pan, speed){
  const o = sprites[orig]; if (!o) return;
  o.anchor = null;   // 실제 걷기 — 배회 앵커는 도착 지점에서 다시 잡는다(T-232)
  // T-247(벽 뚫기 수정) — 새 타일 목표를 주기 전에 이전 목표 타일로 스냅.
  // 스프라이트가 지연으로 못 따라왔을 때 경로 밖 직선(벽 관통)으로 질러가는 것을
  // 차단한다(원본 generative agents처럼 그리드 스냅 후 다음 칸 이동).
  if (o.s){ o.s.x = o.tx; o.s.y = o.ty; }
  moveSpriteToPx(o, x * TILE + 16, y * TILE + 16, pan, speed);
}

// T-232 — 대기 중 잔잔한 배회(순수 연출): 몇 초에 한 번 임의 스프라이트가 앵커
// (마지막 실제 위치) 주변 ≤1타일을 다녀온다. 실제 걷기 중엔 쉬고, 게임 로직 무영향.
const IDLE_TICK_MS = 2200;
setInterval(() => {
  if (!scene || walkActive > 0 || boardGather) return;
  const keys = Object.keys(sprites);
  if (!keys.length) return;
  const o = sprites[keys[Math.floor(Math.random() * keys.length)]];
  if (!o.anchor) o.anchor = { x: o.tx, y: o.ty };
  const roam = Math.random() < 0.55;
  // T-247 — 배회 반경을 자기 타일 안(±10px)으로 축소: 충돌 데이터가 없는 표현
  // 계층에서 1타일 배회는 벽·가구를 뚫어 보였다(사용자 리포트 ②).
  const nx = roam ? o.anchor.x + Math.round((Math.random() * 2 - 1) * 10) : o.anchor.x;
  const ny = roam ? o.anchor.y + Math.round((Math.random() * 2 - 1) * 8) : o.anchor.y;
  moveSpriteToPx(o, nx, ny, false);
  setTimeout(() => { if (walkActive === 0) o.s.stop(); }, 700);  // 제자리 걸음 방지
}, IDLE_TICK_MS);

// §13.3 "빠르게 지나갈 날은 빨리감기" — 수백 타일을 한 칸씩 재생하지 않고 균등 샘플링.
function sampleSteps(allSteps, max){
  const n = allSteps.length;
  return n <= max ? allSteps
    : Array.from({ length: max }, (_, i) => allSteps[Math.floor(i * (n - 1) / (max - 1))]);
}

async function playSteps(orig, allSteps, pan, stepMs, max, gen){
  walkActive += 1;
  // T-247 — 스텝 간격에 정확히 맞는 등속(px/frame): 다음 칸이 올 때 이미 도착해
  // 있어야 스냅이 안 보이고 카메라도 스프라이트에 밀착한다.
  const pxPerFrame = (TILE * (1000 / 60) / stepMs) * 1.06;
  try {
    for (const [x, y] of sampleSteps(allSteps, max)){
      if (gen !== walkGen) return;   // T-229 — 새 날 걷기가 시작됨: 이전 루프 종료
      while (boardGather){           // T-255 — 게시판 열림: 마을 전체 정지
        sprites[orig]?.s.stop();
        await new Promise((r) => setTimeout(r, 300));
        if (gen !== walkGen) return;
      }
      moveSprite(orig, x, y, pan, pxPerFrame);
      await new Promise((r) => setTimeout(r, stepMs));
    }
    const o = sprites[orig];
    if (o && scene) o.s.stop();
  } finally {
    walkActive -= 1;
  }
}

// T-233 — 사용자 피드백("순간이동 말고 집에서부터 한칸씩"): 샘플링 대신 전체 타일을
// 연속 재생한다. 스텝 간격은 경로 길이에 맞춰 목표 시간 안에 들어오게 조절(130~320ms),
// 폭주 방지로 600타일 하드캡만 유지. 짧은 경로(NPC)는 자연히 먼저 도착해 배회로 전환.
const WALK_TARGET_MS = 48000, BAND_TARGET_MS = 16000;
const STEP_MS_MIN = 130, STEP_MS_MAX = 320, HARD_CAP = 600;

function stepMsFor(n, targetMs){
  if (n <= 0) return STEP_MS_MAX;
  return Math.max(STEP_MS_MIN, Math.min(STEP_MS_MAX, Math.floor((targetMs || WALK_TARGET_MS) / n)));
}

async function walkToday(gameId){
  const gen = ++walkGen;   // T-229 — 이 날 걷기의 세대(이전 날 잔여 루프 즉시 무효화)
  const w = await api("/control/game/day/walk?game_id=" + encodeURIComponent(gameId));
  // NPC들은 카메라 추적 없이 동시 재생(T-221 상시 이동 연출) — 완료를 기다리지 않고
  // 클론 걸음(페이싱 계약)이 끝나면 walked를 보낸다.
  Object.entries(w.npcs || {}).forEach(([nid, steps]) => {
    playSteps(nid, steps || [], false, stepMsFor((steps || []).length), HARD_CAP, gen);
  });
  const cloneSteps = w.steps || [];
  await playSteps(CLONE_ORIG, cloneSteps, true, stepMsFor(cloneSteps.length), HARD_CAP, gen);
  window.parent.postMessage({ type: "walked" }, "*");
}

// T-242 — 클론 말풍선: 이동 중엔 목적지, 도착하면 그 장소의 활동 플레이버(다음
// 구간까지 유지). 표현 계층 전용 — 게임 수치와 무관한 서사 텍스트.
const PLACE_DOING = {
  "카페": "☕ 커피 한 잔… 근데 차트가 자꾸 눈에 들어온다",
  "일터": "🛠 일하는 중 (머릿속은 온통 시세)",
  "광장": "🌳 바람 좀 쐬는 중",
  "운동": "🏃 달리면서 멘탈 다잡는 중",
  "집_차트": "🏠 집에서 차트 뚫어져라 보는 중",
  "펍": "🍺 옆 테이블 투자 무용담 엿듣는 중",
  "마켓": "🧺 장 보는 중 (지출도 투자다)",
  "도서관": "📚 투자 책 뒤적이는 중",
};
const PLACE_SHORT = { "집_차트": "집" };

// T-270 — 만남 연출 전 인접 접근(사용자 피드백 ⑤ "가까이 있어야 대화").
// 표현 계층이라 충돌 데이터가 없다 — 만남은 같은 장소에서만 발생하므로 L자
// 직선 경로(가로 먼저)로 인접(맨해튼 ≤1)까지 걷고, 폭주 방지 12타일 캡.
function tileOf(o){ return [Math.round((o.tx - 16) / TILE), Math.round((o.ty - 16) / TILE)]; }
function approachPath(from, to){
  const steps = [];
  let [x, y] = from;
  const [gx, gy] = to;
  while (Math.abs(x - gx) + Math.abs(y - gy) > 1 && steps.length < 12){
    if (x !== gx) x += x < gx ? 1 : -1;
    else y += y < gy ? 1 : -1;
    steps.push([x, y]);
  }
  return steps;
}

// T-262 — 두 스프라이트가 서로를 바라본다(대화 연출). 방향별 정지 프레임:
// down 1 · left 4 · right 7 · up 10 (스프라이트시트 3프레임 걷기의 가운데).
const FACE_FRAME = { down: 1, left: 4, right: 7, up: 10 };
function faceEachOther(origA, origB){
  const a = sprites[origA], b = sprites[origB];
  if (!a || !b) return;
  const face = (from, to) => {
    const dx = to.s.x - from.s.x, dy = to.s.y - from.s.y;
    const dir = Math.abs(dx) >= Math.abs(dy)
      ? (dx >= 0 ? "right" : "left") : (dy >= 0 ? "down" : "up");
    from.s.stop();
    from.s.setFrame(FACE_FRAME[dir]);
  };
  face(a, b);
  face(b, a);
}

function setBubble(orig, text){
  const o = sprites[orig];
  if (!o || !scene) return;
  if (o.bubble){ o.bubble.destroy(); o.bubble = null; }
  if (!text) return;
  const t = scene.add.text(0, -2, text, {
    fontSize: "13px",
    fontFamily: "Pretendard, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif",
    fontStyle: "bold", color: "#1f2937",
  }).setOrigin(0.5).setResolution(3);
  // T-247 — 원본(generative agents) 말풍선 에셋(v3, 말꼬리 포함)을 텍스트 크기에
  // 맞춰 늘려 쓴다(사용자 요청 — 직접 그린 도형 대신).
  const img = scene.add.image(0, 0, "bubble");
  img.setDisplaySize(t.width + 26, t.height + 18);
  o.bubble = scene.add.container(o.s.x, o.s.y, [img, t]).setDepth(21);
}

// T-237 §12.1b — 시간대 동기 재생: 부모가 {type:"walk", band:"오전"…}를 단계마다
// 보내면 그 시간대 일과 구간만 걷고 {type:"walked", band}로 답한다. 하루치 경로는
// 첫 구간(오전)에서 한 번만 받아 캐시(서버가 day 캐시라 재요청하면 빈값이 온다).
let walkData = null;

async function walkBand(gameId, band, speedup){
  const gen = ++walkGen;
  const bg = ++bubbleGen;
  const target = BAND_TARGET_MS / Math.max(1, speedup || 1);   // T-243 배속
  if (band === "오전" || walkData === null){
    walkData = await api("/control/game/day/walk?game_id=" + encodeURIComponent(gameId));
  }
  const segs = (walkData.segments || {});
  const npcSegs = (walkData.npc_segments || {});
  Object.entries(npcSegs).forEach(([nid, bands]) => {
    const seg = (bands || {})[band] || [];
    playSteps(nid, seg, false, stepMsFor(seg.length, target), HARD_CAP, gen);
  });
  const cloneSeg = segs[band] || [];
  // T-242 — 이동 중 말풍선: 이 시간대의 목적지들.
  const plan = ((walkData.plan || {})[band]) || [];
  const planLabel = plan.map((p) => PLACE_SHORT[p] || p).join(" · ");
  if (plan.length && cloneSeg.length) setBubble(CLONE_ORIG, "🚶 ➜ " + planLabel);
  await playSteps(CLONE_ORIG, cloneSeg, true, stepMsFor(cloneSeg.length, target), HARD_CAP, gen);
  // 도착 — 이 시간대 마지막 장소의 활동 플레이버(다음 구간까지 유지).
  if (gen === walkGen && plan.length){
    setBubble(CLONE_ORIG, PLACE_DOING[plan[plan.length - 1]] || "");
  }
  // T-249 — 이 시간대에 동선이 겹친 만남: 두 스프라이트가 실제로 대화한다.
  const met = ((walkData.meetings_by_band || {})[band]) || [];
  if (gen === walkGen && met.length){
    const m = met[0];
    // T-270 — 만남은 붙어서(사용자 피드백 ⑤): NPC가 클론의 인접 타일까지 걸어온
    // 뒤에 대화를 시작한다. 같은 장소라 경로는 몇 타일 수준(12타일 캡).
    const a = sprites[CLONE_ORIG], b = sprites[m.id];
    if (a && b){
      const path = approachPath(tileOf(b), tileOf(a));
      if (path.length) await playSteps(m.id, path, false, 170, HARD_CAP, gen);
    }
    if (gen !== walkGen || bubbleGen !== bg){
      window.parent.postMessage({ type: "walked", band }, "*");
      return;
    }
    faceEachOther(CLONE_ORIG, m.id);   // T-262 — 대화는 정면으로(사용자 피드백)
    setBubble(CLONE_ORIG, "💬 " + m.name + "와 이야기 중");
    setBubble(m.id, "💬");
    // T-275(사용자 리포트) — 대화가 끝나기 전에 walked를 보내면 부모가 게시판/
    // 위기 모달을 즉시 열어 대화를 끊는다. 대화 시간만큼 **await**(배속 반영)한
    // 뒤에 walked를 보낸다 — 게시판은 대화가 끝난 뒤에 열린다.
    await new Promise((r) => setTimeout(r, 4500 / Math.max(1, speedup || 1)));
    if (gen === walkGen && bubbleGen === bg){
      setBubble(m.id, null);
      if (plan.length) setBubble(CLONE_ORIG, PLACE_DOING[plan[plan.length - 1]] || "");
    }
  }
  window.parent.postMessage({ type: "walked", band }, "*");
  if (band === "저녁"){
    walkData = null;   // 다음 날은 새로 받는다
    // T-247 — 하루가 끝나면 활동 말풍선을 정리(잔존 방지, 사용자 리포트 ④).
    const genAtEnd = walkGen, bgAtEnd = bubbleGen;
    setTimeout(() => {
      if (walkGen === genAtEnd && bubbleGen === bgAtEnd) setBubble(CLONE_ORIG, null);
    }, 6000);
  }
}

async function boot(gameId){
  // Phaser 텍스트는 캔버스 렌더라 폰트가 로드된 뒤 만들어야 한다(실패해도 폴백 폰트로 진행).
  try { await document.fonts.load("bold 20px Pretendard"); } catch (e) { /* 폴백 */ }
  const home = await api("/control/game/day/home?game_id=" + encodeURIComponent(gameId));
  if (home.status !== "ok") return;
  window.__PLACES = home.places || [];   // T-240 — 장소 라벨(생성은 create()에서)
  const walkers = [
    { orig: CLONE_ORIG, key: home.persona.underscore, initial: home.persona.initial,
      x: home.pos[0], y: home.pos[1], cam: true },
    ...(home.npcs || []).map((n) => (
      { orig: n.id, key: n.sprite, initial: n.name, x: n.pos[0], y: n.pos[1], cam: false })),
  ];
  bootPhaser(walkers);
}

const params = new URLSearchParams(location.search);
const GAME_ID = params.get("game_id");
if (GAME_ID) boot(GAME_ID);

window.addEventListener("message", (e) => {
  if (!GAME_ID || !e.data) return;
  if (e.data.type === "walk"){
    // T-233 — 수신 즉시 ack: 부모(MapBackground)가 "지도 살아있음"을 알고
    // 걷기 완료(walked)까지 제대로 기다릴 수 있게 한다(기존 4초 포기 문제).
    window.parent.postMessage({ type: "walk-ack", band: e.data.band ?? null }, "*");
    if (e.data.band) walkBand(GAME_ID, e.data.band, e.data.speedup);   // T-237/T-243
    else walkToday(GAME_ID);                            // 하위호환(밴드 없는 통재생)
  }
  // T-255 — 게시판 열림: 마을 전체가 걸음을 멈추고(배회 정지) 핸드폰 알림 ❗.
  if (e.data.type === "board_gather"){
    boardGather = true;
    bubbleGen += 1;
    Object.keys(sprites).forEach((orig) => {
      if (orig !== CLONE_ORIG) setBubble(orig, "❗");
      sprites[orig].s.stop();
    });
    setBubble(CLONE_ORIG, "📱 마을 게시판이 시끄럽다…");
  }
  if (e.data.type === "board_release"){
    boardGather = false;
    bubbleGen += 1;
    Object.keys(sprites).forEach((orig) => { if (orig !== CLONE_ORIG) setBubble(orig, null); });
    setBubble(CLONE_ORIG, null);
  }
  // T-256 — 매매 순간 가시화: 밤 정산 뒤 그날 사고판 이들에게 💸/📉.
  if (e.data.type === "trade_fx" && Array.isArray(e.data.trades)){
    const bg = ++bubbleGen;
    e.data.trades.forEach((tr) => {
      const orig = tr.id === "gamerun_clone" ? CLONE_ORIG : tr.id;
      if (!sprites[orig]) return;
      setBubble(orig, tr.action === "buy" ? "💸 매수!" : "📉 던졌다!");
    });
    setTimeout(() => {
      if (bubbleGen !== bg) return;   // 이미 다음 날/게시판이 말풍선을 소유
      e.data.trades.forEach((tr) => {
        const orig = tr.id === "gamerun_clone" ? CLONE_ORIG : tr.id;
        if (sprites[orig]) setBubble(orig, null);
      });
    }, 3500);
  }
});
</script>
